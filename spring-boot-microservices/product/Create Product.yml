info:
  name: Create Product
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8083/products
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Keyboard",
        "price": 499.99
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
