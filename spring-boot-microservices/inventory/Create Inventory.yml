info:
  name: Create Inventory
  type: http
  seq: 3

http:
  method: post
  url: http://localhost:8081/inventory
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "productId": 1,
        "availableQuantity": 10
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
